{% extends "base.html" %}
{% block title %}New Item{% endblock %}
{% block page_title %}New Item{% endblock %}
{% block page_subtitle %}Add a new product to inventory.{% endblock %}
{% set active = "items" %}

{% block content %}
<div class="card">
    <div class="badge b-blue">NEW ITEM</div>

    {% if error %}
    <div class="badge b-red" style="margin-top:12px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/items/new" style="margin-top:12px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}" />
        <div class="inputs">
            <div>
                <label>Name</label>
                <input name="name" required>
            </div>

            <div>
                <label>SKU</label>
                <input name="sku">
            </div>

            <div>
                <label>Category</label>
                <input name="category" placeholder="Merchant / Category">
            </div>

            <div>
                <label>Unit</label>
                <input name="unit" value="pcs">
            </div>

            <div>
                <label>Reorder Level</label>
                <input name="reorder_level" type="number" min="0" value="0">
            </div>

            <div style="grid-column:1/-1;">
                <label>Aliases <span style="color:var(--muted);font-weight:400;font-size:11px;">(comma-separated alternative names sellers might use)</span></label>
                <input name="aliases" placeholder="e.g. female tea set, women's tea, slimming tea" maxlength="500">
            </div>

            <input type="hidden" name="cost_price" value="0">
            <input type="hidden" name="selling_price" value="0">

            <div>
                <button class="btnPrimary" type="submit">Save</button>
                <a class="btnGhost" href="/items">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
