<!DOCTYPE html>
<html>
<head>
<title>{% block title %}Inventory{% endblock %}</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.sidebar{
width:220px;
background:#1f2a40;
color:white;
position:fixed;
height:100%;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
}

.sidebar a:hover{
background:#2d3b5f;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.badge{
padding:6px 10px;
border-radius:5px;
color:white;
font-size:12px;
}

.b-green{background:#16a34a}
.b-red{background:#dc2626}
.b-blue{background:#2563eb}
.b-purple{background:#7c3aed}

.btnPrimary{
background:#2563eb;
color:white;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Inventory</h3>

<a href="/">Dashboard</a>
<a href="/items">Items</a>
<a href="/transactions">Transactions</a>
<a href="/deliveries">Deliveries</a>

</div>

<div class="main">

{% block content %}{% endblock %}

</div>

</body>
</html>
